<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Hills - КП Хилс</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
        .header { background: #2d5a27; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .header a { color: white; text-decoration: none; padding: 0.5rem 1rem; background: #4a7c43; border-radius: 5px; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        h1 { text-align: center; margin-bottom: 2rem; color: #1a1a1a; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
        .gallery-item { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.3s; }
        .gallery-item:hover { transform: scale(1.03); }
        .gallery-item img { width: 100%; height: 250px; object-fit: cover; }
        .gallery-item .caption { padding: 1rem; text-align: center; color: #666; }
        .footer { text-align: center; padding: 2rem; color: #666; margin-top: 2rem; }
        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 90%; max-height: 90%; border-radius: 10px; }
        .lightbox .close { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }
        .lightbox .caption { position: absolute; bottom: 20px; color: white; font-size: 18px; }
    </style>
</head>
<body>
    <div class="header">
        <h2>КП Хилс - Green Hills</h2>
        <a href="../index.html">Назад</a>
    </div>
    <div class="container">
        <h1>Green Hills - Галерия</h1>
        <div class="gallery">
            <div class="gallery-item" onclick="openLightbox(this)"><img src="../images/BeliOsymFront.jpg" alt="Фасад"><div class="caption">Фасад</div></div>
            <div class="gallery-item" onclick="openLightbox(this)"><img src="../images/BeliOsymBanq.jpg" alt="Баня"><div class="caption">Баня</div></div>
            <div class="gallery-item" onclick="openLightbox(this)"><img src="../images/BeliOsymBanq2.jpg" alt="Баня 2"><div class="caption">Баня 2</div></div>
            <div class="gallery-item" onclick="openLightbox(this)"><img src="../images/BeliOsymHol.jpg" alt="Хол"><div class="caption">Хол</div></div>
            <div class="gallery-item" onclick="openLightbox(this)"><img src="../images/BeliOsymHol2.jpg" alt="Хол 2"><div class="caption">Хол 2</div></div>
            <div class="gallery-item" onclick="openLightbox(this)"><img src="../images/BeliOsymHol3.jpg" alt="Хол 3"><div class="caption">Хол 3</div></div>
            <div class="gallery-item" onclick="openLightbox(this)"><img src="../images/BeliOsymHol4.jpg" alt="Хол 4"><div class="caption">Хол 4</div></div>
            <div class="gallery-item" onclick="openLightbox(this)"><img src="../images/BeliOsymHol5.jpg" alt="Хол 5"><div class="caption">Хол 5</div></div>
            <div class="gallery-item" onclick="openLightbox(this)"><img src="../images/BeliOsymHol6.jpg" alt="Хол 6"><div class="caption">Хол 6</div></div>
            <div class="gallery-item" onclick="openLightbox(this)"><img src="../images/BeliOsymHol7.jpg" alt="Хол 7"><div class="caption">Хол 7</div></div>
            <div class="gallery-item" onclick="openLightbox(this)"><img src="../images/BeliOsymHol8.jpg" alt="Хол 8"><div class="caption">Хол 8</div></div>
            <div class="gallery-item" onclick="openLightbox(this)"><img src="../images/BeliOsymHol9.jpg" alt="Хол 9"><div class="caption">Хол 9</div></div>
        </div>
    </div>
    <div class="footer">
        <p>&copy; 2024 КП Хилс</p>
    </div>
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="close">&times;</span>
        <img id="lightbox-img" src="" alt="">
        <div class="caption" id="lightbox-caption"></div>
    </div>
    <script>
        function openLightbox(el) {
            var img = el.querySelector('img');
            var caption = el.querySelector('.caption').textContent;
            document.getElementById('lightbox-img').src = img.src;
            document.getElementById('lightbox-caption').textContent = caption;
            document.getElementById('lightbox').classList.add('active');
        }
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }
    </script>
</body>
</html>
