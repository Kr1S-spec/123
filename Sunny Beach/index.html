<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunny Beach - КП Хилс</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
        .header { background: #2d5a27; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .header a { color: white; text-decoration: none; padding: 0.5rem 1rem; background: #4a7c43; border-radius: 5px; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        h1 { text-align: center; margin-bottom: 2rem; color: #1a1a1a; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
        .gallery-item { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.3s; }
        .gallery-item:hover { transform: scale(1.03); }
        .gallery-item img { width: 100%; height: 250px; object-fit: cover; }
        .gallery-item .caption { padding: 1rem; text-align: center; color: #666; }
        .footer { text-align: center; padding: 2rem; color: #666; margin-top: 2rem; }
        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 90%; max-height: 90%; border-radius: 10px; }
        .lightbox .close { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }
        .lightbox .caption { position: absolute; bottom: 20px; color: white; font-size: 18px; }
    </style>
</head>
<body>
    <div class="header">
        <h2>КП Хилс - Sunny Beach</h2>
        <a href="../index.html">Назад</a>
    </div>
    <div class="container">
        <h1>Sunny Beach - Галерия</h1>
        <div class="gallery">
            <div class="gallery-item" onclick="otvoriSlika(this)"><img src="../images/BeliOsymSpalnq.jpg" alt="Спалня"><div class="caption">Спалня</div></div>
            <div class="gallery-item" onclick="otvoriSlika(this)"><img src="../images/BeliOsymSpalnq2.jpg" alt="Спалня 2"><div class="caption">Спалня 2</div></div>
            <div class="gallery-item" onclick="otvoriSlika(this)"><img src="../images/BeliOsymSpalnq3.jpg" alt="Спалня 3"><div class="caption">Спалня 3</div></div>
            <div class="gallery-item" onclick="otvoriSlika(this)"><img src="../images/BeliOsymSpalnq4.jpg" alt="Спалня 4"><div class="caption">Спалня 4</div></div>
            <div class="gallery-item" onclick="otvoriSlika(this)"><img src="../images/BeliOsymSpalnq5.jpg" alt="Спалня 5"><div class="caption">Спалня 5</div></div>
            <div class="gallery-item" onclick="otvoriSlika(this)"><img src="../images/BeliOsymSpalnq6.jpg" alt="Спалня 6"><div class="caption">Спалня 6</div></div>
            <div class="gallery-item" onclick="otvoriSlika(this)"><img src="../images/BeliOsymSpalnq7.jpg" alt="Спалня 7"><div class="caption">Спалня 7</div></div>
            <div class="gallery-item" onclick="otvoriSlika(this)"><img src="../images/BeliOsymTerasa.jpg" alt="Тераса"><div class="caption">Тераса</div></div>
            <div class="gallery-item" onclick="otvoriSlika(this)"><img src="../images/BeliOsymTerasa2.jpg" alt="Тераса 2"><div class="caption">Тераса 2</div></div>
            <div class="gallery-item" onclick="otvoriSlika(this)"><img src="../images/BeliOsymTerasa3.jpg" alt="Тераса 3"><div class="caption">Тераса 3</div></div>
            <div class="gallery-item" onclick="otvoriSlika(this)"><img src="../images/BeliOsymVino.jpg" alt="Лозя"><div class="caption">Лозя</div></div>
            <div class="gallery-item" onclick="otvoriSlika(this)"><img src="../images/BeliOsymVino2.jpg" alt="Лозя 2"><div class="caption">Лозя 2</div></div>
            <div class="gallery-item" onclick="otvoriSlika(this)"><img src="../images/BeliOsymVino4.jpg" alt="Лозя 3"><div class="caption">Лозя 3</div></div>
        </div>
    </div>
    <div class="footer">
        <p>&copy; 2024 КП Хилс</p>
    </div>
    <div class="lightbox" id="lightbox" onclick="zatvoriSlika()">
        <span class="close">&times;</span>
        <img id="golqmaSlika" src="" alt="">
        <div class="caption" id="tekstCapt"></div>
    </div>
    <script>
        function otvoriSlika(el) {
            var slika = el.querySelector('img');
            var tekst = el.querySelector('.caption').textContent;
            document.getElementById('golqmaSlika').src = slika.src;
            document.getElementById('tekstCapt').textContent = tekst;
            document.getElementById('lightbox').classList.add('active');
        }
        function zatvoriSlika() {
            document.getElementById('lightbox').classList.remove('active');
        }
    </script>
</body>
</html>
