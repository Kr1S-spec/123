<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pleven - КП Хилс</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
        .header { background: #2d5a27; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .header a { color: white; text-decoration: none; padding: 0.5rem 1rem; background: #4a7c43; border-radius: 5px; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        h1 { text-align: center; margin-bottom: 2rem; color: #1a1a1a; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
        .gallery-item { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.3s; }
        .gallery-item:hover { transform: scale(1.03); }
        .gallery-item img { width: 100%; height: 250px; object-fit: cover; }
        .gallery-item .caption { padding: 1rem; text-align: center; color: #666; }
        .footer { text-align: center; padding: 2rem; color: #666; margin-top: 2rem; }
        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 90%; max-height: 90%; border-radius: 10px; }
        .lightbox .close { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }
        .lightbox .caption { position: absolute; bottom: 20px; color: white; font-size: 18px; }
    </style>
</head>
<body>
    <div class="header">
        <h2>КП Хилс - Pleven</h2>
        <a href="../index.html">Назад</a>
    </div>
    <div class="container">
        <h1>Pleven - Галерия</h1>
        <div class="gallery">
            <div class="gallery-item" onclick="openLightbox(this)"><img src="../images/BeliOsymDete.jpg" alt="Детска"><div class="caption">Детска</div></div>
            <div class="gallery-item" onclick="openLightbox(this)"><img src="../images/BeliOsymGame.jpg" alt="Игрална"><div class="caption">Игрална</div></div>
            <div class="gallery-item" onclick="openLightbox(this)"><img src="../images/BeliOsymGame2.jpg" alt="Игрална 2"><div class="caption">Игрална 2</div></div>
            <div class="gallery-item" onclick="openLightbox(this)"><img src="../images/BeliOsymKoridor.jpg" alt="Коридор"><div class="caption">Коридор</div></div>
            <div class="gallery-item" onclick="openLightbox(this)"><img src="../images/BeliOsymSnimka.jpg" alt="Снимка 1"><div class="caption">Снимка 1</div></div>
            <div class="gallery-item" onclick="openLightbox(this)"><img src="../images/BeliOsymSnimka1.jpg" alt="Снимка 2"><div class="caption">Снимка 2</div></div>
            <div class="gallery-item" onclick="openLightbox(this)"><img src="../images/BeliOsymSnimka2.jpg" alt="Снимка 3"><div class="caption">Снимка 3</div></div>
            <div class="gallery-item" onclick="openLightbox(this)"><img src="../images/BeliOsymSnimka3.jpg" alt="Снимка 4"><div class="caption">Снимка 4</div></div>
            <div class="gallery-item" onclick="openLightbox(this)"><img src="../images/BeliOsymSnimka4.jpg" alt="Снимка 5"><div class="caption">Снимка 5</div></div>
            <div class="gallery-item" onclick="openLightbox(this)"><img src="../images/BeliOsymSnimka5.jpg" alt="Снимка 6"><div class="caption">Снимка 6</div></div>
            <div class="gallery-item" onclick="openLightbox(this)"><img src="../images/BeliOsymFront.jpg" alt="Фасад"><div class="caption">Фасад</div></div>
        </div>
    </div>
    <div class="footer">
        <p>&copy; 2024 КП Хилс</p>
    </div>
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="close">&times;</span>
        <img id="lightbox-img" src="" alt="">
        <div class="caption" id="lightbox-caption"></div>
    </div>
    <script>
        function openLightbox(el) {
            var img = el.querySelector('img');
            var caption = el.querySelector('.caption').textContent;
            document.getElementById('lightbox-img').src = img.src;
            document.getElementById('lightbox-caption').textContent = caption;
            document.getElementById('lightbox').classList.add('active');
        }
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }
    </script>
</body>
</html>
